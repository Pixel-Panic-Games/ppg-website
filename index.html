<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomePage | Pixel Panic Games</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#000000',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#000000] text-white min-h-screen flex flex-col">

  <!-- Banner -->
  <header class="w-full">
    <img
      src="./images/Logo-white.png"
      alt="PPG Banner"
      class="object-cover max-h-72"
    />
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center py-16 px-4">

    <!-- Section Title -->
    <h2 class="text-3xl font-bold tracking-widest uppercase text-gray-300 mb-10">
      The official home of Pixel Panic Games
    </h2>

    <!-- Game Poster -->
    <div class="rounded-2xl overflow-hidden shadow-2xl shadow-black/60 border border-white/10 w-auto">
      <!--img
        src=""
        alt="Game Poster"
        class="w-full object-cover"
      /-->
      <div class="bg-[#16161a] px-6 py-4">
        <p class="text-gray-400 text-center tracking-wide uppercase">Keep watching this space to see our latest updates!</p>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-[#0a0a0c] border-t border-white/10 py-8 px-6">
    <div class="max-w-4xl mx-auto flex flex-col items-center gap-6">

      <!-- Footer Links -->
      <nav class="flex flex-wrap justify-center gap-6 text-sm text-gray-400">
        <a href="/privacy-policy" class="hover:text-white transition-colors duration-200">Privacy Policy</a>
        <!-- <a href="#" class="hover:text-white transition-colors duration-200"></a>
        <a href="#" class="hover:text-white transition-colors duration-200"></a>
        <a href="#" class="hover:text-white transition-colors duration-200"></a> -->
      </nav>

      <!-- Copyright -->
      <p class="text-xs text-gray-300">&copy; 2026 Pixel Panic Games. All rights reserved.</p>

    </div>
  </footer>

</body>
</html>
